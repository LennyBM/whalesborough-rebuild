# Netlify configuration for Whalesborough Farm Resort & Spa

[build]
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# Redirects — canonical URL enforcement and legacy URL support
[[redirects]]
  from = "http://whalesborough.co.uk/*"
  to = "https://www.whalesborough.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.whalesborough.co.uk/*"
  to = "https://www.whalesborough.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://whalesborough.co.uk/*"
  to = "https://www.whalesborough.co.uk/:splat"
  status = 301
  force = true

# Legacy URL redirects
# NOTE: /terms-and-conditions/ directory confirmed present in repo root.
[[redirects]]
  from = "/holiday-cottage-terms-conditions/"
  to = "/terms-and-conditions/"
  status = 301

[[redirects]]
  from = "/terms-of-use/"
  to = "/terms-and-conditions/"
  status = 301

[[redirects]]
  from = "/hitting-the-coast/"
  to = "/exploring-cornwall/hitting-the-coast/"
  status = 301

[[redirects]]
  from = "/days-with-your-dog/"
  to = "/dog-friendly-breaks/"
  status = 301

[[redirects]]
  from = "/swimming-pool/"
  to = "/spa-and-treatments/"
  status = 301

[[redirects]]
  from = "/why-buy-a-holiday-home/"
  to = "/holiday-home-ownership/"
  status = 301

[[redirects]]
  from = "/holiday-home-investment/"
  to = "/holiday-home-ownership/"
  status = 301

[[redirects]]
  from = "/holiday-home-investment"
  to = "/holiday-home-ownership/"
  status = 301

[[redirects]]
  from = "/stay-as-a-group/"
  to = "/groups/"
  status = 301

[[redirects]]
  from = "/our-cottages/nans-house/"
  to = "/our-cottages/"
  status = 301

# Redirect bare logo-preview.html to homepage (dev file, not for public)
[[redirects]]
  from = "/logo-preview.html"
  to = "/"
  status = 301

# Trailing-slash normalisation for blog
[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

# Passthrough for pitch page (static file must bypass catch-all 404)
[[redirects]]
  from = "/pitch"
  to = "/pitch/index.html"
  status = 200

[[redirects]]
  from = "/pitch/"
  to = "/pitch/index.html"
  status = 200

# Custom 404 — catch-all for any path without a matching file or rule above
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Cache headers — see _headers file for the authoritative rules.
# Per Netlify's resolution order, _headers takes precedence over [[headers]] blocks.
# Kept minimal here so there's a single source of truth.

# Block staging deploys (deploy-previews and branch builds) from indexing
[context.deploy-preview]
  [context.deploy-preview.environment]
    HUGO_ENV = "staging"

[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[context.branch-deploy.headers]]
  for = "/*"
  [context.branch-deploy.headers.values]
    X-Robots-Tag = "noindex, nofollow"
